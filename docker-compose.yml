services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pocsecret}
      POSTGRES_DB: ${POSTGRES_DB:-pocdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Ollama has no default healthcheck; the API is ready after the daemon starts.
    # Memory: this compose file does not cap RAM. If Ollama returns errors like
    # "model requires more system memory than is available", increase Docker
    # Desktop → Settings → Resources → Memory (the Linux VM budget), then restart.
    init: true

volumes:
  pgdata:
  ollama_data:
